name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 10 * * 1,4'  # Lunes y jueves a las 10:00 UTC
  workflow_dispatch:        # permite ejecutarlo manual desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "https://mrzxdqbxythnbsyjfkbm.supabase.co/rest/v1/toolkit_progress?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
