name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 10 * * 1,4'  # Lunes y jueves a las 10:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://mrzxdqbxythnbsyjfkbm.supabase.co/rest/v1/toolkit_progress" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"user_id":"__keepalive__","item_key":"ping","is_done":true}'
